name: Release

on:
  release:
    types: [published]

defaults:
  run:
    shell: bash

jobs:
  publish:
    name: Publish to RubyGems
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Configure RubyGems credentials
        uses: rubygems/configure-rubygems-credentials@a251ea8ec8e94203b26acddd2010f89b187a44b7
        with:
          role-to-assume: rg_oidc_akr_fn8dx45asckvmsnd2kka

      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # 6.0.3

      - name: Setup Ruby
        uses: ruby/setup-ruby@12fd324f1d0b43274fdc8130f6980590a667c455 # 1.312.0
        with:
          bundler-cache: true

      - name: Publish to RubyGems
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          bundle exec rake build
          gem push pkg/workos-${VERSION}.gem --host https://rubygems.org
